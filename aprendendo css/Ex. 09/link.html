<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links personalizados</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        /*SELETORES
         # = ID
         . = CLASS
         : = PSEUDO CLASSE
         ::= PSEUDO ELEMENTO
         > = CHILDREN*/
        
        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
            font-size: 1em;
        }

        a:visited{
            color: darkred;
        }

        a:hover{
            color:black;
            text-decoration: underline;
            font-size: 1.2em;
        }
        
        a:active{
            color:blue;
        }

        a::after{
            content: '[link]';
            text-decoration: none;
            font-weight: normal;
            color: black;
        }
    </style>
</head>
<body>
    <h1>personalizando links</h1>
    <ul>
        <li><a target="_blank" href="https://www.youtube.com/channel/UCY5QKzOaiJa-ERAcqBH_gBw">calcinha preta youtube</a></li>
        <li><a target="_blank" href="https://www.instagram.com/teodorovictor449/?__pwa=1">instagram</a></li>
        <li><a target="_blank" href="https://www.youtube.com/watch?v=vMlrcOVr7po&list=PLHz_AreHm4dlUpEXkY1AyVLQGcpSgVF8s&index=22">video aleatorio</a></li>
    </ul>
</body>
</html>
