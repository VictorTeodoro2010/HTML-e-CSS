<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box level</title>
    <style>
        h1{
            background-color: lightgray;
            height: 300px;
            width: 300px;

            border-width: 10px;
            border-style: solid; 
            /* dashed, dotted, solid, double, groove*/
            border-color: aquamarine;
            /*Border: px tipo cor; ou border: 10px solid blue;*/

            padding-top: 10px;
            padding-right: 10px;
            padding-left: 10px;
            padding-bottom: 10px;
            /*Padding: top right bottom left; ou Padding: 10px 10px 10px 10px;*/

            margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 20px;
            margin-left: 20px;
            /*Margin: top right bottom left*/ 

            outline-width: 5px;
            outline-style: dashed;
            outline-color: orange;
            /*Outline: width style color*/
        }

        a{
            border-width: 10px;
            border-style: solid;
            border-color: brown;    
            padding-top: 10px;
            padding-right: 10px;
            padding-left: 10px;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de box level</h1>
    <p>paragrafos tambem são exemplos de box level mas os <a href="#">links são exemplo de caixas inline-level</a> vamos ver como funciona</p>
</body>
</html>
