<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exportando fontes</title>
   <style>
    
    @font-face {
        font-family: 'god';
        src: url('fontes/vogue/Vogue.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    } /*Tipos de format()
        - opentype (otf)
        - truetype (ttf)
        - embedded-opentype
        - truetype-aat (Apple Advanced Typography)
        - svg */

    body{
        font-family: 'god', Helvetica, sans-serif;
    }

    h1{
        font-family: 'god', Helvetica, sans-serif;
        font-size: 3em;
    }

   </style>
</head>
<body>
    <h1>Exportando fontes</h1>

</body>
</html>
